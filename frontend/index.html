<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News Lens</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>News Lens</h1>
        <p class="subtitle">Кросс-анализ новостей из разных источников</p>
    </header>

    <nav class="tabs">
        <button class="tab active" data-category="world">Мир</button>
        <button class="tab" data-category="ai">ИИ</button>
        <span class="tab-divider"></span>
        <button class="tab view-tab" data-view="week">За неделю</button>
    </nav>

    <div class="controls">
        <div class="date-nav">
            <button id="prev-day">&larr;</button>
            <span id="current-date"></span>
            <button id="next-day">&rarr;</button>
        </div>
        <div class="filters">
            <select id="credibility-filter">
                <option value="all">Все</option>
                <option value="confirmed">Подтверждено</option>
                <option value="likely">Вероятно</option>
                <option value="unverified">Не проверено</option>
                <option value="disputed">Спорно</option>
            </select>
            <label class="toggle">
                <input type="checkbox" id="top-only" checked>
                Только главное
            </label>
        </div>
    </div>

    <main id="events-container">
        <div class="loading">Загрузка...</div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js"></script>
</body>
</html>
